    <!--
      SPA GitHub Pages redirect decode (rafgraph/spa-github-pages).
      Pairs with public/404.html. Restores the real path before React boots
      so BrowserRouter can match. Safe no-op when no redirect query is present.
    -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
    <script>
      // Apply persisted theme before paint to avoid FOUC.
      (function () {
        try {
          var t = localStorage.getItem("portfolio-theme") || "steam";
          var allowed = ["steam", "light", "midnight", "synthwave", "forest"];
          if (allowed.indexOf(t) === -1) t = "steam";
          document.documentElement.setAttribute("data-theme", t);
          if (t !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "steam");
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
